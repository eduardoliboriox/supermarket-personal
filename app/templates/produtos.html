{% extends "base.html" %}
{% block title %}Produtos{% endblock %}

{% block content %}

<section class="page-shell">

    <div class="page-hero">
        <div class="page-hero-left">
            <h1 class="page-title">Produtos</h1>
            <p class="page-muted">Edite nome, preço e categoria com rapidez.</p>
        </div>
    </div>

    <div class="admin-grid">
        {% for p in produtos %}
        <div class="admin-card" data-id="{{ p.id }}">

            <div class="admin-card-head">
                <span class="admin-pill">ID #{{ p.id }}</span>
                <span class="admin-muted">Último preço: R$ {{ "%.2f"|format(p.ultimo_preco) }}</span>
            </div>

            <label class="field">
                <span>Nome</span>
                <input class="produto-nome"
                       value="{{ p.nome }}"
                       placeholder="Nome do produto">
            </label>

            <div class="two-cols">
                <label class="field">
                    <span>Preço</span>
                    <input class="produto-preco"
                           type="number"
                           step="0.01"
                           value="{{ "%.2f"|format(p.ultimo_preco) }}"
                           placeholder="Preço">
                </label>

                <label class="field">
                    <span>Categoria</span>
                    <select class="produto-categoria">
                        {% for categoria in categorias %}
                        <option value="{{ categoria }}"
                            {% if p.setor == categoria %}selected{% endif %}>
                            {{ categoria }}
                        </option>
                        {% endfor %}
                    </select>
                </label>
            </div>

            <div class="admin-actions">
                <button class="btn-primary" onclick="salvarProduto({{ p.id }})">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Salvar
                </button>

                <button class="btn-danger" onclick="excluirProduto({{ p.id }})">
                    <i class="fa-solid fa-trash"></i>
                    Excluir
                </button>
            </div>

        </div>
        {% endfor %}
    </div>

</section>


<!-- ================= JS (seu, mantido) ================= -->
<script>
function salvarProduto(id) {
    const card = document.querySelector(`[data-id="${id}"]`);
    if (!card) return;

    const nome  = card.querySelector(".produto-nome").value.trim();
    const preco = Number(card.querySelector(".produto-preco").value);
    const setor = card.querySelector(".produto-categoria").value;

    if (!nome || preco <= 0) {
        alert("Informe um nome válido e um preço maior que zero.");
        return;
    }

    fetch("/api/produto/atualizar", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            nome: nome,
            preco: preco,
            setor: setor
        })
    })
    .then(r => r.json())
    .then(res => {
        if (res.status === "ok") {
            card.classList.add("saved");
            setTimeout(() => card.classList.remove("saved"), 900);
        } else {
            alert(res.message || "Erro ao salvar produto.");
        }
    })
    .catch(() => alert("Erro de comunicação com o servidor."));
}

function excluirProduto(id) {
    if (!confirm("Deseja realmente excluir este produto?")) return;

    fetch("/api/produto/excluir", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id: id })
    })
    .then(r => r.json())
    .then(res => {
        if (res.status === "ok") {
            const card = document.querySelector(`[data-id="${id}"]`);
            if (card) card.remove();
        } else {
            alert(res.message || "Erro ao excluir produto.");
        }
    })
    .catch(() => alert("Erro de comunicação com o servidor."));
}
</script>

{% endblock %}
