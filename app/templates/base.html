<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <title>{% block title %}Supermercado{% endblock %}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- PWA -->
    <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
    <meta name="theme-color" content="#0d6efd">

    <!-- iOS -->
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logos/pwa-192.png') }}">

    <!-- CSS PRINCIPAL -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- ================= APP HEADER (NOVO) ================= -->
<header class="app-header">
    <div class="app-header-left">
        <img
            class="app-logo"
            src="{{ url_for('static', filename='images/logos/icon-logo-mobile.png') }}"
            alt="Supermercado"
        />
        <div class="app-title">
            <strong>Supermercado</strong>
            <span class="app-subtitle">{% if page=='produtos' %}Gerenciar produtos{% else %}Lista de compras{% endif %}</span>
        </div>
    </div>

    <div class="app-header-right">
        <button class="icon-btn btn-search" type="button" aria-label="Buscar">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </div>
</header>

<!-- Barra de busca (melhorada, mantendo a funcionalidade do main.js) -->
<div class="mobile-search">
    <div class="mobile-search-inner">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" placeholder="Buscar..." />
        <button class="mobile-search-clear" type="button" aria-label="Limpar">×</button>
    </div>
</div>

<!-- ================= CONTEÚDO ================= -->
<main class="app-main">
    {% block content %}{% endblock %}
</main>

<!-- ================= BOTTOM NAV ================= -->
<nav class="bottom-nav">

    <a href="{{ url_for('pages.home') }}"
       class="bottom-item {% if page=='home' %}active{% endif %}">
        <img src="{{ url_for('static', filename='images/icons/home.jpeg') }}"
             class="bottom-icon"
             alt="Home">
        <small>Home</small>
    </a>

    <a href="{{ url_for('pages.produtos') }}"
       class="bottom-item {% if page=='produtos' %}active{% endif %}">
        <img src="{{ url_for('static', filename='images/icons/produtos.jpeg') }}"
             class="bottom-icon"
             alt="Produtos">
        <small>Produtos</small>
    </a>

    <a class="bottom-item disabled" onclick="paginaEmBreve()">
        <img src="{{ url_for('static', filename='images/icons/movimentar.jpeg') }}"
             class="bottom-icon"
             alt="Carrinho">
        <small>Carrinho</small>
    </a>

    <a class="bottom-item disabled" onclick="paginaEmBreve()">
        <img src="{{ url_for('static', filename='images/icons/menu-mais.jpeg') }}"
             class="bottom-icon"
             alt="Mais">
        <small>Mais</small>
    </a>
</nav>

<!-- ================= JS GLOBAL ================= -->
<script src="{{ url_for('static', filename='js/main.js') }}"></script>

<script>
function paginaEmBreve() {
    alert("🚧 Página em desenvolvimento");
}
</script>

</body>
</html>
